<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <script src="script.js"></script>
    <div class="mainbox">
        <div class="boxleft">
            <div class="boxleft1">
                <div class="box1contents">
                    <div class="spotify hov">
                        <img src="assets/logo.svg" alt="">Spotify
                    </div>
                    <div class="home hov"><img src="assets/home.svg
                    " alt="" height="30px">Home</div>
                    <div class="search hov"><img src="assets/search.svg" alt="" height="30px">Search</div>
                </div>
            </div>
            <div class="boxleft2">
                <div class="lib hov"><img src="assets/library.svg" alt="" height="30px">Your Library</div>
                <div class="songlist">
                    <ol class="oip">

                    </ol>
                </div>
            </div>
        </div>
        <div class="boxright">
            <div class="header">
                <div class="arrows">
                    <img src="assets/left.svg" alt="" height="25px">
                    <img src="assets/right.svg" alt="" height="25px">
                </div>
                <div class="buttons"><button class="signup">Sign Up</button>
                    <button class="login">Log in</button>
                </div>
            </div>
            <div class="main">
                <div class="top">
                    <div class="spot">

                        Spotify Playlist
                    </div>
                    <div class="showall">

                        Show all
                    </div>
                </div>
                <div class="cards">
                    <div class="card">
                        <img src="assets/1.jpg" class="im" alt="">
                        <img src="assets/logo.svg" class="imm" alt="">
                        <h3 class="txt1">Ciggaretes after Sex</h1>
                            <h6 class="txt2">Apocayplse, Sunsetz...</h6>
                    </div>
                    <div class="card">
                        <img src="assets/2.jpg" class="im" alt="">
                        <img src="assets/logo.svg" class="imm" alt="">
                        <h3 class="txt1">Alec Benjamin</h1>
                            <h6 class="txt2">Jesus in la, must have been the wind...</h6>
                    </div>
                    <div class="card">
                        <img src="assets/3.jpg" class="im" alt="">
                        <img src="assets/logo.svg" class="imm" alt="">
                        <h3 class="txt1">Sasha Sloan</h1>
                            <h6 class="txt2">Cowboys Cry, Kids...</h6>
                    </div>
                    <div class="card">
                        <img src="assets/4.jpg" class="im" alt="">
                        <img src="assets/logo.svg" class="imm" alt="">
                        <h3 class="txt1">Avicii</h1>
                            <h6 class="txt2">The Nights, Hey Brother...</h6>
                    </div>
                    <div class="card">
                        <img src="assets/5.jpg" class="im" alt="">
                        <img src="assets/logo.svg" class="imm" alt="">
                        <h3 class="txt1">Lana Del Rey</h1>
                            <h6 class="txt2">Freak, Diet Mountain Dew...</h6>
                    </div>
                </div>
                <div class="playbar">
                    <div class="name"></div>
                    <div class="btns">
                        <div class="songname"></div>
                        <img src="assets/left.svg" class="btn nhov" alt="">
                        <img src="assets/play.svg" class="btn play nhov" alt="">
                        <img src="assets/right.svg" class="btn nhov" alt="">
                    </div>
                    <div class="dur"></div>
                    <div class="duration"></div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
